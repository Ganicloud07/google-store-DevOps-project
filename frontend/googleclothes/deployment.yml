apiVersion: apps/v1
kind: Deployment
metadata:
  name: googleclothes-deployment
  labels:
    app: googleclothes
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googleclothes
  template:
    metadata:
      labels:
        app: googleclothes
    spec:
      containers:
      - name: googleclothes
        image: 905418310012.dkr.ecr.us-west-2.amazonaws.com/shopping-site-googleclothes:f2efc2aa1776805c4d800d58c39592991d8b1af7
        ports:
        - containerPort: 80

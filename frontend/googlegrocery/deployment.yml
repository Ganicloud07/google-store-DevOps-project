apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlegrocery-deployment
  labels:
    app: googlegrocery
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlegrocery
  template:
    metadata:
      labels:
        app: googlegrocery
    spec:
      containers:
      - name: googlegrocery
        image: 905418310012.dkr.ecr.us-west-2.amazonaws.com/shopping-site-googlegrocery:f2efc2aa1776805c4d800d58c39592991d8b1af7
        ports:
        - containerPort: 80
